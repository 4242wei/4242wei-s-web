<article class="reader-sheet reader-sheet-note report-reader-sheet">
  <div class="reader-sheet-head">
    <div class="reader-sheet-head-copy">
      <p class="eyebrow">报告阅读</p>
      <h3>{{ report.title }}</h3>
      <p class="reader-sheet-meta-line">{{ report.report_date }} · 更新 {{ report.updated_at }}</p>
    </div>
    <button class="icon-button reader-sheet-close" type="button" aria-label="关闭报告" data-reader-close>×</button>
  </div>
  <div class="card-inline-meta reader-sheet-support">
    {% if is_monitor_report %}
      <span class="meta-chip">Monitor</span>
    {% endif %}
    <span class="meta-chip">{{ report.filename }}</span>
    <a class="text-link" href="{{ url_for('raw_report', filename=report.filename) }}" target="_blank" rel="noreferrer">原 Markdown</a>
    <a class="text-link" href="{{ url_for('monitor_page', report=report.filename) }}">固定到当前页</a>
  </div>
  <div class="reader-section-marker"><span>正文</span></div>
  <div class="reader-sheet-stage">
    <div class="reader-sheet-body report-reader-body">
      <article class="markdown-body">
        {{ report.html | safe }}
      </article>
    </div>
  </div>
</article>
